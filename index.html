<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Tema 9 — Transparencia y Protección de Datos | Opositar en Valencia</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --naranja: #d97706; --naranja-claro: #fef3c7; --naranja-borde: #f59e0b;
    --azul-oscuro: #1e293b; --texto: #374151; --texto-suave: #6b7280;
    --borde: #e5e7eb; --fondo: #fafaf9; --blanco: #ffffff;
    --verde: #166534; --verde-bg: #f0fdf4; --verde-borde: #86efac;
    --rojo: #991b1b; --rojo-bg: #fef2f2; --rojo-borde: #fca5a5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Source Sans 3', sans-serif; background: var(--fondo); color: var(--texto); min-height: 100vh; font-size: 16px; line-height: 1.6; }
  header { background: var(--blanco); border-bottom: 1px solid var(--borde); }
  .header-top { max-width: 860px; margin: 0 auto; padding: 1.4rem 1.5rem 1rem; display: flex; align-items: flex-start; gap: 1.2rem; }
  .header-logo { width: 48px; height: 48px; border-radius: 8px; object-fit: contain; flex-shrink: 0; }
  .header-textos { flex: 1; }
  .header-site { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--naranja); font-weight: 600; margin-bottom: 3px; }
  .header-titulo { font-family: 'Lora', serif; font-size: clamp(1.15rem, 3vw, 1.65rem); font-weight: 700; color: var(--azul-oscuro); line-height: 1.2; }
  .header-sub { font-size: 0.88rem; color: var(--texto-suave); margin-top: 4px; }
  .header-meta { background: var(--naranja-claro); border-top: 1px solid #fde68a; padding: 0.55rem 1.5rem; }
  .header-meta-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; font-size: 0.83rem; color: #92400e; font-weight: 500; }
  .barra-wrap { position: sticky; top: 0; z-index: 100; background: var(--blanco); border-bottom: 1px solid var(--borde); padding: 0.6rem 1.5rem; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
  .barra-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; gap: 1rem; }
  .barra-track { flex: 1; height: 6px; background: #f3f4f6; border-radius: 99px; overflow: hidden; }
  .barra-fill { height: 100%; background: var(--naranja); border-radius: 99px; transition: width 0.35s ease; width: 0%; }
  .barra-num { font-size: 13px; font-weight: 600; color: var(--azul-oscuro); white-space: nowrap; min-width: 52px; }
  .barra-score { font-size: 13px; color: var(--texto-suave); white-space: nowrap; }
  .barra-score .ok { color: var(--verde); font-weight: 600; }
  .barra-score .ko { color: var(--rojo); font-weight: 600; }
  main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }
  .card { background: var(--blanco); border: 1px solid var(--borde); border-radius: 10px; padding: 1.5rem 1.6rem; margin-bottom: 1.4rem; transition: box-shadow 0.2s; }
  .card:hover { box-shadow: 0 3px 14px rgba(0,0,0,0.06); }
  .card-num { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--naranja); margin-bottom: 0.5rem; }
  .card-pregunta { font-family: 'Lora', serif; font-size: 1rem; font-weight: 600; line-height: 1.55; color: var(--azul-oscuro); margin-bottom: 1.1rem; }
  .opciones { display: flex; flex-direction: column; gap: 0.45rem; }
  .opcion { display: flex; align-items: flex-start; gap: 0.7rem; padding: 0.7rem 1rem; border: 1.5px solid var(--borde); border-radius: 7px; cursor: pointer; background: var(--blanco); text-align: left; font-family: 'Source Sans 3', sans-serif; font-size: 0.93rem; color: var(--texto); line-height: 1.5; transition: border-color 0.15s, background 0.15s; width: 100%; }
  .opcion:hover:not(:disabled) { border-color: var(--naranja-borde); background: var(--naranja-claro); }
  .opcion .letra { font-weight: 700; color: var(--naranja); min-width: 18px; font-size: 0.85rem; margin-top: 2px; flex-shrink: 0; }
  .opcion.correcta { border-color: var(--verde-borde); background: var(--verde-bg); color: var(--verde); }
  .opcion.correcta .letra { color: #15803d; }
  .opcion.incorrecta { border-color: var(--rojo-borde); background: var(--rojo-bg); color: var(--rojo); }
  .opcion.incorrecta .letra { color: var(--rojo); }
  .opcion:disabled { cursor: default; }
  .explicacion { display: none; margin-top: 1rem; padding: 0.9rem 1rem 0.9rem 1.1rem; background: #fffbeb; border-left: 3px solid var(--naranja); border-radius: 0 6px 6px 0; font-size: 0.875rem; line-height: 1.65; color: var(--texto); }
  .explicacion.visible { display: block; animation: fadeIn 0.22s ease; }
  .explicacion strong { color: var(--azul-oscuro); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
  .resultado { display: none; background: var(--blanco); border: 1px solid var(--borde); border-radius: 12px; padding: 2.5rem 2rem 2rem; margin: 1.5rem 0 2rem; text-align: center; }
  .resultado.visible { display: block; animation: fadeIn 0.3s ease; }
  .resultado-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--naranja); font-weight: 600; margin-bottom: 0.5rem; }
  .resultado h2 { font-family: 'Lora', serif; font-size: 1.75rem; font-weight: 700; color: var(--azul-oscuro); margin-bottom: 0.3rem; }
  .resultado-nota { font-size: 3.2rem; font-weight: 700; color: var(--azul-oscuro); line-height: 1; margin: 1rem 0 0.3rem; font-family: 'Lora', serif; }
  .resultado-nota span { color: var(--naranja); }
  .calif-badge { display: inline-block; padding: 5px 16px; border-radius: 99px; font-size: 0.9rem; font-weight: 600; margin: 0.6rem 0 1.5rem; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 0 0 1.5rem; }
  .stat { background: var(--fondo); border: 1px solid var(--borde); border-radius: 8px; padding: 0.9rem 0.5rem; }
  .stat-num { font-size: 1.9rem; font-weight: 700; font-family: 'Lora', serif; }
  .stat-lab { font-size: 0.78rem; color: var(--texto-suave); margin-top: 2px; }
  .resultado-hint { font-size: 0.85rem; color: var(--texto-suave); margin-bottom: 1.2rem; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 0.7rem 1.6rem; border-radius: 7px; font-family: 'Source Sans 3', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.18s; }
  .btn-naranja { background: var(--naranja); color: white; }
  .btn-naranja:hover { background: #b45309; transform: translateY(-1px); }
  @media (max-width: 580px) { main { padding: 1.2rem 1rem 4rem; } .card { padding: 1.1rem; } .stats { grid-template-columns: 1fr 1fr; } .header-top { padding: 1rem; gap: 0.8rem; } .header-meta { padding: 0.5rem 1rem; } }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <img class="header-logo"
      src="https://opositorgva.wordpress.com/wp-content/uploads/2024/04/cropped-opositar-en-valencia-logo-sin-fondo.png"
      alt="Opositar en Valencia" onerror="this.style.display='none'">
    <div class="header-textos">
      <div class="header-site">Opositar en Valencia · GVA</div>
      <div class="header-titulo">Tema 9 — Transparencia y Protección de Datos</div>
      <div class="header-sub">Ley 19/2013 (Transparencia, acceso a la información) · LO 3/2018 (Protección de Datos)</div>
    </div>
  </div>
  <div class="header-meta">
    <div class="header-meta-inner">
      <span id="totalLabel">📋 Cargando...</span>
      <span>🎯 Nivel medio-alto</span>
      <span>🔀 Orden aleatorio en cada intento</span>
      <span>✅ Explicación en cada respuesta</span>
    </div>
  </div>
</header>

<div class="barra-wrap">
  <div class="barra-inner">
    <div class="barra-track"><div class="barra-fill" id="barraFill"></div></div>
    <span class="barra-num" id="barraNum">0 / ?</span>
    <span class="barra-score"><span class="ok" id="scoreOk">✓ 0</span> &nbsp;<span class="ko" id="scoreKo">✗ 0</span></span>
  </div>
</div>

<main id="mainContent"></main>

<script>
const BANCO = [

  /* ══ LEY 19/2013 — TÍTULO PRELIMINAR ══ */
  {
    p: "¿Cuál es el objeto de la Ley 19/2013, de transparencia, acceso a la información pública y buen gobierno, según su artículo 1?",
    ops: [
      "Crear el Consejo de Transparencia y Buen Gobierno como organismo regulador único",
      "Ampliar y reforzar la transparencia de la actividad pública, regular y garantizar el derecho de acceso a la información, y establecer las obligaciones de buen gobierno con sus consecuencias por incumplimiento",
      "Regular exclusivamente el procedimiento de acceso a archivos y registros administrativos",
      "Homogeneizar la legislación autonómica en materia de transparencia y buen gobierno"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 1 de la Ley 19/2013 establece tres objetivos: «ampliar y reforzar la transparencia de la actividad pública, regular y garantizar el derecho de acceso a la información relativa a aquella actividad y establecer las obligaciones de buen gobierno que deben cumplir los responsables públicos así como las consecuencias derivadas de su incumplimiento»."
  },

  /* ══ LEY 19/2013 — TÍTULO I, CAP. III, SECCIÓN 1ª ══ */
  {
    p: "El artículo 12 de la Ley 19/2013 reconoce el derecho de acceso a la información pública. ¿En qué precepto constitucional se fundamenta?",
    ops: [
      "Artículo 20 de la Constitución Española",
      "Artículo 23 de la Constitución Española",
      "Artículo 105.b) de la Constitución Española",
      "Artículo 9.2 de la Constitución Española"
    ],
    c: 2,
    exp: "<strong>Respuesta correcta: C.</strong> El art. 12 establece que «todas las personas tienen derecho a acceder a la información pública, en los términos previstos en el artículo 105.b) de la Constitución Española, desarrollados por esta Ley». El art. 105.b) CE reconoce el acceso de los ciudadanos a archivos y registros administrativos, con las excepciones que la ley establezca."
  },
  {
    p: "¿Cómo define el artículo 13 de la Ley 19/2013 el concepto de «información pública»?",
    ops: [
      "Solo los documentos oficiales publicados en diarios oficiales por las Administraciones",
      "Los contenidos o documentos, cualquiera que sea su formato o soporte, que obren en poder de los sujetos incluidos en el ámbito de aplicación del título y que hayan sido elaborados o adquiridos en el ejercicio de sus funciones",
      "Exclusivamente los expedientes administrativos finalizados con resolución firme",
      "Los datos estadísticos y económicos generados por la Administración General del Estado"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 13 define la información pública como «los contenidos o documentos, cualquiera que sea su formato o soporte, que obren en poder de alguno de los sujetos incluidos en el ámbito de aplicación de este título y que hayan sido elaborados o adquiridos en el ejercicio de sus funciones». El concepto es amplio: incluye cualquier formato y exige solo dos requisitos: posesión y vínculo funcional."
  },
  {
    p: "El artículo 14.1 de la Ley 19/2013 enumera los límites al derecho de acceso. ¿Cuál de los siguientes NO figura entre dichos límites?",
    ops: [
      "La seguridad nacional y la defensa",
      "La protección del medio ambiente",
      "Las creencias religiosas del solicitante de la información",
      "El secreto profesional y la propiedad intelectual e industrial"
    ],
    c: 2,
    exp: "<strong>Respuesta correcta: C.</strong> El art. 14.1 enumera doce límites: seguridad nacional, defensa, relaciones exteriores, seguridad pública, prevención/investigación/sanción de ilícitos, igualdad de las partes en procesos judiciales, funciones de vigilancia e inspección, intereses económicos y comerciales, política económica y monetaria, secreto profesional y propiedad intelectual, confidencialidad en procesos de decisión, y protección del medio ambiente. Las creencias religiosas del solicitante no son un límite al acceso; son un dato protegido del afectado (art. 15), no del solicitante."
  },
  {
    p: "¿Qué exige el artículo 14.2 de la Ley 19/2013 para que la aplicación de los límites al derecho de acceso sea válida?",
    ops: [
      "Que la denegación sea aprobada por el Consejo de Transparencia y Buen Gobierno",
      "Que la aplicación de los límites sea justificada y proporcionada a su objeto y finalidad de protección, atendiendo a las circunstancias del caso concreto",
      "Que exista informe previo preceptivo de la Abogacía del Estado",
      "Que el límite esté expresamente invocado por el solicitante en su petición inicial"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 14.2 establece que «la aplicación de los límites será justificada y proporcionada a su objeto y finalidad de protección y atenderá a las circunstancias del caso concreto, especialmente a la concurrencia de un interés público o privado superior que justifique el acceso». No basta con invocar el límite abstractamente: requiere motivación y ponderación en cada caso."
  },
  {
    p: "Según el artículo 15.1 de la Ley 19/2013, ¿cuándo se puede autorizar el acceso a información que contenga datos personales que revelen ideología, afiliación sindical, religión o creencias?",
    ops: [
      "Cuando lo solicite un investigador acreditado con fines científicos",
      "Únicamente con el consentimiento expreso y por escrito del afectado, salvo que este los hubiese hecho manifiestamente públicos con anterioridad",
      "Cuando el órgano competente lo autorice motivadamente por razones de interés general",
      "En ningún caso, salvo resolución judicial firme que lo autorice expresamente"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 15.1 establece que el acceso a datos sobre ideología, afiliación sindical, religión o creencias «únicamente se podrá autorizar en caso de que se contase con el consentimiento expreso y por escrito del afectado, a menos que dicho afectado hubiese hecho manifiestamente públicos los datos con anterioridad a que se solicitase el acceso». Es el régimen de protección más estricto de la Ley."
  },
  {
    p: "El artículo 15.1 de la Ley 19/2013 regula también el acceso a datos relativos a origen racial, salud, vida sexual, datos genéticos o biométricos. ¿Bajo qué condiciones puede autorizarse el acceso?",
    ops: [
      "Solo mediante orden judicial expresa que lo autorice caso por caso",
      "Con el consentimiento expreso del afectado o si este estuviera amparado por una norma con rango de ley",
      "Tras disociación obligatoria de los datos en todo caso, sin posibilidad de acceso íntegro",
      "Mediante autorización del Defensor del Pueblo, oído el órgano competente"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 15.1 in fine establece que el acceso a datos de origen racial, salud, vida sexual, datos genéticos/biométricos o infracciones penales/administrativas sin amonestación pública «solo se podrá autorizar en caso de que se cuente con el consentimiento expreso del afectado o si aquel estuviera amparado por una norma con rango de ley». Nótese que aquí no se exige que el consentimiento sea «por escrito», a diferencia del supuesto del primer párrafo."
  },
  {
    p: "El artículo 15.2 de la Ley 19/2013 establece una regla general para los datos meramente identificativos relacionados con la organización, funcionamiento o actividad pública del órgano. ¿Cuál es?",
    ops: [
      "Se deniega el acceso salvo autorización expresa del afectado",
      "Se concederá el acceso, salvo que en el caso concreto prevalezca la protección de datos personales u otros derechos constitucionales sobre el interés público en la divulgación",
      "Se concede el acceso únicamente tras un periodo de disociación de cinco años desde su generación",
      "Se requiere siempre informe previo de la Agencia Española de Protección de Datos"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 15.2 establece que «con carácter general, y salvo que en el caso concreto prevalezca la protección de datos personales u otros derechos constitucionalmente protegidos sobre el interés público en la divulgación que lo impida, se concederá el acceso a información que contenga datos meramente identificativos relacionados con la organización, funcionamiento o actividad pública del órgano». La regla general es la concesión del acceso para este tipo de datos."
  },
  {
    p: "Cuando la información solicitada no contiene datos especialmente protegidos (art. 15.3 de la Ley 19/2013), ¿qué debe hacer el órgano competente antes de conceder el acceso?",
    ops: [
      "Conceder el acceso automáticamente sin ningún tipo de ponderación previa",
      "Realizar una ponderación suficientemente razonada entre el interés público en la divulgación y los derechos de los afectados, en particular su derecho a la protección de datos",
      "Solicitar autorización al superior jerárquico antes de resolver",
      "Consultar preceptivamente al Consejo de Transparencia y Buen Gobierno"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 15.3 establece que el órgano «concederá el acceso previa ponderación suficientemente razonada del interés público en la divulgación de la información y los derechos de los afectados cuyos datos aparezcan en la información solicitada, en particular su derecho fundamental a la protección de datos de carácter personal»."
  },
  {
    p: "¿Cuál de los siguientes NO es uno de los criterios de ponderación que enumera el artículo 15.3 de la Ley 19/2013?",
    ops: [
      "El menor perjuicio a los afectados derivado del transcurso de los plazos del art. 57 de la Ley del Patrimonio Histórico Español",
      "La justificación del solicitante en el ejercicio de un derecho, o su condición de investigador con fines históricos, científicos o estadísticos",
      "El número de solicitudes de acceso presentadas anteriormente por el mismo solicitante",
      "La mayor garantía de los derechos de los afectados cuando los datos puedan afectar a su intimidad, seguridad o se refieran a menores"
    ],
    c: 2,
    exp: "<strong>Respuesta correcta: C.</strong> El art. 15.3 enumera cuatro criterios: a) menor perjuicio por transcurso de plazos del Patrimonio Histórico; b) justificación del solicitante o condición de investigador; c) menor perjuicio si los datos son meramente identificativos; d) mayor garantía si afecta a intimidad, seguridad o menores. El número de solicitudes previas del solicitante no es un criterio de ponderación de este artículo (aunque sí es relevante para la causa de inadmisión por carácter repetitivo del art. 18.1.e)."
  },
  {
    p: "¿Qué establece el artículo 15.4 de la Ley 19/2013 sobre la disociación de datos personales?",
    ops: [
      "La disociación es siempre obligatoria antes de conceder cualquier acceso a información pública",
      "Las reglas de protección de datos personales no serán aplicables si el acceso se efectúa previa disociación de los datos de modo que se impida la identificación de las personas afectadas",
      "La disociación solo puede realizarla la Agencia Española de Protección de Datos",
      "La disociación únicamente se aplica a datos especialmente protegidos, no a los meramente identificativos"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 15.4 establece que «no será aplicable lo establecido en los apartados anteriores si el acceso se efectúa previa disociación de los datos de carácter personal de modo que se impida la identificación de las personas afectadas». La disociación (anonimización) permite sortear las restricciones de protección de datos, ya que sin identificación no hay dato personal afectado."
  },
  {
    p: "El artículo 16 de la Ley 19/2013 regula el acceso parcial. ¿En qué supuesto NO procede conceder dicho acceso parcial?",
    ops: [
      "Cuando alguno de los límites del art. 14 no afecte a la totalidad de la información",
      "Cuando, tras omitir la información afectada por el límite, resulte una información distorsionada o que carezca de sentido",
      "Cuando el solicitante no haya motivado expresamente su petición de acceso",
      "Cuando hayan transcurrido más de quince días desde la presentación de la solicitud"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 16 establece que se concederá el acceso parcial omitiendo la información afectada por el límite, «salvo que de ello resulte una información distorsionada o que carezca de sentido». En tal caso no procede el acceso parcial, y debe indicarse al solicitante que parte de la información ha sido omitida."
  },

  /* ══ LEY 19/2013 — SECCIÓN 2ª: EJERCICIO DEL DERECHO ══ */
  {
    p: "Según el artículo 17.3 de la Ley 19/2013, ¿está el solicitante obligado a motivar su solicitud de acceso a la información?",
    ops: [
      "Sí, siempre, motivando el interés legítimo que ostenta",
      "No está obligado a motivarla, aunque puede exponer los motivos, que podrán tenerse en cuenta; la ausencia de motivación no será por sí sola causa de rechazo",
      "Solo está obligado a motivarla cuando la información afecte a datos personales de terceros",
      "Solo está obligado cuando la solicitud se presente por medios no electrónicos"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 17.3 establece que «el solicitante no está obligado a motivar su solicitud de acceso a la información. Sin embargo, podrá exponer los motivos por los que solicita la información y que podrán ser tenidos en cuenta cuando se dicte la resolución. No obstante, la ausencia de motivación no será por si sola causa de rechazo de la solicitud»."
  },
  {
    p: "¿Qué establece el artículo 17.4 de la Ley 19/2013 respecto al idioma de las solicitudes de acceso?",
    ops: [
      "Las solicitudes deben presentarse obligatoriamente en castellano salvo acuerdo bilateral",
      "Los solicitantes podrán dirigirse a las Administraciones Públicas en cualquiera de las lenguas cooficiales del Estado en el territorio en que radique la Administración en cuestión",
      "Solo se admite el castellano como lengua oficial de tramitación de solicitudes de acceso",
      "Se requiere traducción jurada cuando la solicitud se presente en una lengua cooficial distinta del castellano"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 17.4 dispone que «los solicitantes de información podrán dirigirse a las Administraciones Públicas en cualquiera de las lenguas cooficiales del Estado en el territorio en el que radique la Administración en cuestión». Respeta así el régimen de cooficialidad lingüística reconocido constitucionalmente."
  },
  {
    p: "¿Cuál de las siguientes causas de inadmisión NO figura en el artículo 18.1 de la Ley 19/2013?",
    ops: [
      "Información que esté en curso de elaboración o de publicación general",
      "Información que tenga carácter auxiliar o de apoyo, como notas, borradores u opiniones internas",
      "Información cuya divulgación pueda perjudicar la imagen institucional del órgano solicitado",
      "Solicitudes manifiestamente repetitivas o de carácter abusivo no justificado con la finalidad de transparencia"
    ],

/* ── LÓGICA ── */
let orden = [], respondidas = 0, aciertos = 0, errores = 0;
const TOTAL = BANCO.length;

document.getElementById('totalLabel').textContent = '📋 ' + TOTAL + ' preguntas';
document.getElementById('barraNum').textContent = '0 / ' + TOTAL;

function mezclar(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function actualizarBarra() {
  document.getElementById('barraFill').style.width = ((respondidas / TOTAL) * 100) + '%';
  document.getElementById('barraNum').textContent = respondidas + ' / ' + TOTAL;
  document.getElementById('scoreOk').textContent = '✓ ' + aciertos;
  document.getElementById('scoreKo').textContent = '✗ ' + errores;
}

function construirPreguntas() {
  orden = mezclar([...Array(TOTAL).keys()]);
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  const letras = ['A', 'B', 'C', 'D'];

  orden.forEach((idx, pos) => {
    const q = BANCO[idx];
    const opsOrden = mezclar([0, 1, 2, 3]);
    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + pos;

    const numDiv = document.createElement('div');
    numDiv.className = 'card-num';
    numDiv.textContent = 'Pregunta ' + (pos + 1);

    const pregDiv = document.createElement('div');
    pregDiv.className = 'card-pregunta';
    pregDiv.textContent = q.p;

    const opcionesDiv = document.createElement('div');
    opcionesDiv.className = 'opciones';

    opsOrden.forEach((opIdx, i) => {
      const btn = document.createElement('button');
      btn.className = 'opcion';
      btn.dataset.correcto = (opIdx === q.c) ? '1' : '0';
      btn.dataset.pos = pos;
      btn.innerHTML = '<span class="letra">' + letras[i] + '</span><span>' + q.ops[opIdx] + '</span>';
      btn.addEventListener('click', onOpcionClick);
      opcionesDiv.appendChild(btn);
    });

    const expDiv = document.createElement('div');
    expDiv.className = 'explicacion';
    expDiv.id = 'exp-' + pos;
    expDiv.innerHTML = q.exp;

    card.appendChild(numDiv);
    card.appendChild(pregDiv);
    card.appendChild(opcionesDiv);
    card.appendChild(expDiv);
    main.appendChild(card);
  });

  const res = document.createElement('div');
  res.className = 'resultado';
  res.id = 'resultado';
  res.innerHTML = `
    <div class="resultado-eyebrow">Resultado final</div>
    <h2>Test completado</h2>
    <div class="resultado-nota"><span id="rNota">-</span><span style="font-size:1.5rem;color:var(--texto-suave)">/10</span></div>
    <div id="rBadge" class="calif-badge"></div>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="rOk" style="color:var(--verde)">-</div><div class="stat-lab">Correctas</div></div>
      <div class="stat"><div class="stat-num" id="rKo" style="color:var(--rojo)">-</div><div class="stat-lab">Erróneas</div></div>
      <div class="stat"><div class="stat-num" id="rPct">-</div><div class="stat-lab">% Acierto</div></div>
    </div>
    <p class="resultado-hint">Revisa las explicaciones en cada pregunta para reforzar los conceptos.</p>
    <button class="btn btn-naranja" onclick="reiniciar()">🔄 Nuevo intento</button>
  `;
  main.appendChild(res);
}

function onOpcionClick(e) {
  const btn = e.currentTarget;
  const pos = parseInt(btn.dataset.pos);
  const card = document.getElementById('card-' + pos);
  card.querySelectorAll('.opcion').forEach(b => {
    b.disabled = true;
    if (b.dataset.correcto === '1') b.classList.add('correcta');
    else if (b === btn) b.classList.add('incorrecta');
  });
  document.getElementById('exp-' + pos).classList.add('visible');
  if (btn.dataset.correcto === '1') aciertos++; else errores++;
  respondidas++;
  actualizarBarra();
  if (respondidas === TOTAL) mostrarResultado();
}

function mostrarResultado() {
  const nota = ((aciertos / TOTAL) * 10).toFixed(1);
  const pct = Math.round((aciertos / TOTAL) * 100);
  let badge = '', color = '';
  if (pct >= 90)      { badge = '🏆 Sobresaliente'; color = '#166534'; }
  else if (pct >= 70) { badge = '✅ Notable';        color = '#1d4ed8'; }
  else if (pct >= 50) { badge = '⚠️ Aprobado';      color = '#92400e'; }
  else                { badge = '❌ Suspenso';       color = '#991b1b'; }
  document.getElementById('rNota').textContent = nota;
  document.getElementById('rOk').textContent = aciertos;
  document.getElementById('rKo').textContent = errores;
  document.getElementById('rPct').textContent = pct + '%';
  const badgeEl = document.getElementById('rBadge');
  badgeEl.textContent = badge;
  badgeEl.style.cssText += `;background:${color}22;color:${color};border:1px solid ${color}44`;
  const res = document.getElementById('resultado');
  res.classList.add('visible');
  setTimeout(() => res.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

function reiniciar() {
  respondidas = 0; aciertos = 0; errores = 0;
  actualizarBarra();
  construirPreguntas();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

construirPreguntas();
</script>
</body>
</html>
